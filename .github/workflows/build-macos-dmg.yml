name: Build macOS DMG

on:
  push:
    branches: [ main ]
    paths-ignore:
      - ".github/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: patch
        type: choice
        options: [ patch, minor, major ]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: anothrNick/github-tag-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: ${{ inputs.bump || 'patch' }}
          MAJOR_STRING_TOKEN: "BREAKING CHANGE"
          MINOR_STRING_TOKEN: "feat:"
          PATCH_STRING_TOKEN: "fix:"

  build:
    needs: tag
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main

    - name: Set version env
      env:
        NEW_TAG: ${{ needs.tag.outputs.new_tag }}
      run: echo "VERSION=$NEW_TAG" >> "$GITHUB_ENV"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pyinstaller
        brew install create-dmg

    - name: Build application with PyInstaller
      run: |
        VERSION_PY="version.py"
        echo "VERSION = '${VERSION}'" > $VERSION_PY

        pyinstaller --name="MSTeamsWaker" \
          --windowed \
          --icon=assets/app_icon.icns \
          --add-data="README.md:." \
          --add-data="${VERSION_PY}:." \
          --osx-bundle-identifier="com.msteamswaker.app" \
          teams_waker_app.py

        ls -la dist/

    - name: Create DMG
      run: |
        DMG_NAME="MSTeamsWaker-${VERSION}.dmg"

        create-dmg \
          --volname "MS Teams Waker ${VERSION}" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --icon "MSTeamsWaker.app" 200 190 \
          --hide-extension "MSTeamsWaker.app" \
          --app-drop-link 600 185 \
          "$DMG_NAME" \
          "dist/MSTeamsWaker.app"

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: MSTeamsWaker-${{ env.VERSION }}
        path: MSTeamsWaker-${{ env.VERSION }}.dmg

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.tag.outputs.new_tag }}
        name: ${{ needs.tag.outputs.new_tag }}
        files: MSTeamsWaker-${{ env.VERSION }}.dmg
        generate_release_notes: true
